<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .pulse {
        animation: pulseGlow 2s ease-in-out infinite;
      }

      @keyframes pulseGlow {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 0.6; }
      }
    </style>
  </defs>

  <!-- Static orbit rings -->
  <ellipse cx="36" cy="36" rx="28" ry="10" stroke="rgba(96,165,250,0.35)" stroke-width="1"/>
  <ellipse cx="36" cy="36" rx="28" ry="10" stroke="rgba(96,165,250,0.2)" stroke-width="0.5" transform="rotate(35 36 36)"/>

  <!-- Center circle -->
  <circle cx="36" cy="36" r="30"
    fill="rgba(29,78,216,0.9)"
    stroke="rgba(96,165,250,0.8)"
    stroke-width="2"
    class="pulse"
  />

  <!-- BIG MYK text -->
  <text
    x="36"
    y="44"
    text-anchor="middle"
    font-size="20"
    font-weight="800"
    fill="#bfdbfe"
    filter="url(#glow)"
    style="font-family: 'Orbitron', sans-serif;"
  >
    MYK
  </text>
</svg>